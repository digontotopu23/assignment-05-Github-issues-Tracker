<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GitHub Issues Tracker</title>


    <!-- font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind+Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- StyleSheet  -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

    <div class="card w-96 bg-white shadow-xl p-6">

        <div class="flex justify-center text-4xl mb-2">
            <!-- <i class="fa-brands fa-github"></i> -->
            <img src="assets/github-logo.png" alt="">
        </div>

        <h2 class="text-center font-bold text-xl">
            GitHub Issues Tracker
        </h2>

        <p class="text-center text-gray-500 mb-4">
            Sign in to manage your issues
        </p>

        <div>
            <p>Username</p>
            <input id="username" placeholder="Enter Username" class="input input-bordered w-full mb-3">
        </div>

        <div>
          <p>Password</p>
            <input id="password" type="Enter password" placeholder="Password" class="input input-bordered w-full mb-3">
        </div>

        <button onclick="login()" class="btn btn-primary w-full">
            Sign In
        </button>

        <div class="divider">OR</div> 
        <h1 class="text-center text-gray-500 mb-4">Demo Credentials:</h1>

        <p class="text-center text-sm font-bold">
            Username: admin <br>
            Password: admin123
        </p>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
