<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GitHub Issues Tracker</title>


    <!-- font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind+Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- StyleSheet  -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100">

    <!-- Navbar -->

    <div class="navbar bg-white shadow px-5 md:px-6 flex flex-col md:flex-row gap-4 py-3">

        <div class="flex-1 flex items-center gap-2 w-full md:w-auto">

            <img src="assets/github-logo.png" class="w-8">

            <h1 class="font-bold text-lg whitespace-nowrap">
                GitHub Issues Tracker
            </h1>

        </div>

        <div class="flex gap-2 w-full md:w-auto">

            <input id="searchInput" type="text" placeholder="Search issues" class="input input-bordered flex-1 md:w-64">

            <button onclick="searchIssue()" class="btn btn-primary">
                Search
            </button>

        </div>


    </div>


    <!-- Tabs -->

    <div class="p-6 bg-white w-11/12 mx-auto mt-15">

        <div class="tabs tabs-boxed space-x-2 mb-6">

            <button onclick="setTab('all')" id="allTab" class="tab tab-active btn btn-primary text-white">
                All
            </button>

            <button onclick="setTab('open')" id="openTab" class="tab btn">
                Open
            </button>

            <button onclick="setTab('closed')" id="closedTab" class="tab btn">
                Closed
            </button>

        </div>

        <div
            class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6">

            <div class="flex items-center gap-4">
                <div class="p-2 bg-purple-50 rounded-lg">
                    <img src="assets/Aperture.png" alt="Logo" class="w-10 h-10 object-contain">
                </div>

                <div>
                    <h2 class="text-2xl font-extrabold text-gray-800 leading-none">
                        <span id="totalIssueCount">0</span> Issues
                    </h2>
                    <p class="text-sm text-gray-500 mt-1 font-medium">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-6 mt-4 md:mt-0">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-[#22C55E]"></span>
                    <span class="text-sm font-bold text-gray-600">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-[#a855f7]"></span>
                    <span class="text-sm font-bold text-gray-600">Closed</span>
                </div>
            </div>
        </div>

        <!-- Issues Container -->

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

        </div>

    </div>

    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl p-8 rounded-2xl">
            <h3 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-2"></h3>

            <div class="flex flex-wrap items-center gap-2 mb-4">
                <span id="modalStatusBadge" class="badge badge-success text-white font-semibold py-3">Opened</span>
                <span class="text-sm text-gray-500 font-medium">• Opened by <span id="modalAuthor"
                        class="font-bold text-gray-700"></span> • <span id="modalDate"></span></span>
            </div>

            <div id="modalLabels" class="flex flex-wrap gap-2 mb-6">
            </div>

            <hr class="border-gray-100 mb-6">

            <div class="mb-8">
                <p id="modalDesc" class="text-gray-600 leading-relaxed"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 bg-gray-50 p-5 rounded-xl mb-6">
                <div>
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-1">Assignee:</p>
                    <p id="modalAssigneeName" class="font-bold text-gray-800"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-1">Priority:</p>
                    <span id="modalPriorityBadge"
                        class="badge badge-error text-white text-[10px] font-bold uppercase">HIGH</span>
                </div>
            </div>

            <div class="modal-action">
                <button class="btn btn-primary px-8 rounded-lg border-none bg-indigo-600 hover:bg-indigo-700"
                    onclick="closeModal()">Close</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button onclick="closeModal()">close</button>
        </form>
    </dialog>

    <script src="js/app.js"></script>
</body>

</html>
