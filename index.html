<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GitHub Issues Tracker</title>


    <!-- font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind+Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- StyleSheet  -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100">

    <!-- Navbar -->

    <div class="navbar bg-white shadow">

        <div class="flex-1">
            <a class="text-xl font-bold">GitHub Issues Tracker</a>
        </div>

        <div class="flex gap-2">

            <input id="searchInput" type="text" placeholder="Search issues" class="input input-bordered">

            <button class="btn btn-primary">
                Search
            </button>

        </div>


    </div>


    <!-- Tabs -->

    <div class="p-6 bg-white w-11/12 mx-auto mt-15">

        <div class="tabs tabs-boxed mb-6">

            <button onclick="loadIssues()" class="tab tab-active">
                All
            </button>

            <button onclick="loadOpen()" class="tab">
                Open
            </button>

            <button class="tab">
                Closed
            </button>

        </div>
        
         <!-- Issues Container -->

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

        </div>

     </div>

        <script src="js/app.js"></script>
</body>

</html>
